# Qwen2.5-1.5B-Instruct — multilingual model (English + Indonesian)
# Good for: multilingual tasks, 4-8GB GPU or CPU (slower)
model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct
model_family: qwen
load_in_4bit: false
load_in_8bit: false
torch_dtype: float16
device_map: auto

# LoRA hyperparameters
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
