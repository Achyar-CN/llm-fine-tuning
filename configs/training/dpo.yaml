# DPO (Direct Preference Optimization) training config
# Use after SFT — fine-tune on preference pairs (chosen vs rejected)
output_dir: outputs/checkpoints_dpo
num_train_epochs: 1
per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 5.0e-7
warmup_ratio: 0.01
lr_scheduler_type: cosine
logging_steps: 10
save_steps: 100
eval_steps: 100
save_total_limit: 2
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false
fp16: true
bf16: false
gradient_checkpointing: true
max_grad_norm: 1.0
weight_decay: 0.0
early_stopping_patience: 3
